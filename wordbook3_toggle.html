var allOpen = false;
var app = document.getElementById('app');

function render() {
  GROUPS.forEach(function(group, gi) {
    var startNum = gi * 100 + 1;
    var endNum = gi * 100 + group.length;
    var div = document.createElement('div');
    div.className = 'group';
    
    var itemsHtml = '';
    group.forEach(function(w, wi) {
      var num = startNum + wi;
      var meaning = (w.m || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      itemsHtml += '<div class="word-item"><span class="word-num">' + num + '.</span><span class="word-word">' + w.w + '</span><span class="word-meaning">' + meaning + '</span></div>';
    });
    
    div.innerHTML = '<div class="group-header" data-idx="' + gi + '"><h2>' + startNum + '~' + endNum + ' <span class="count">(' + group.length + '단어)</span></h2><span class="arrow">▼</span></div><div class="group-body" data-idx="' + gi + '"><div class="word-grid">' + itemsHtml + '</div></div>';
    app.appendChild(div);
  });

  document.querySelectorAll('.group-header').forEach(function(h) {
    h.addEventListener('click', function() {
      var idx = this.dataset.idx;
      var body = document.querySelector('.group-body[data-idx="' + idx + '"]');
      var arrow = this.querySelector('.arrow');
      body.classList.toggle('open');
      arrow.classList.toggle('open');
    });
  });

  document.getElementById('toggleAllBtn').addEventListener('click', function() {
    allOpen = !allOpen;
    this.textContent = allOpen ? '모두 접기' : '모두 펼치기';
    document.querySelectorAll('.group-body').forEach(function(b) { b.classList.toggle('open', allOpen); });
    document.querySelectorAll('.arrow').forEach(function(a) { a.classList.toggle('open', allOpen); });
  });
}

render();
</script>
