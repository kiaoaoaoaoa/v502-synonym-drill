// ── Persistence ───────────────────────────
var SESSION_KEY = "v502-synonym-drill-session";
var QUIZ_PROGRESS_KEY = "v502-synonym-drill-wb3quiz-progress";
var QUIZ_SCORE_KEY = "v502-synonym-drill-wb3quiz-best";

function getPlayerName() {
  try {
    var s = JSON.parse(localStorage.getItem(SESSION_KEY));
    return (s && s.name) ? s.name : null;
  } catch(e) { return null; }
}

function loadProgress() {
  var name = getPlayerName();
  if (!name) return { answered: {}, picks: {}, scored: {}, score: 0 };
  try {
    var raw = localStorage.getItem(QUIZ_PROGRESS_KEY);
    if (!raw) return { answered: {}, picks: {}, scored: {}, score: 0 };
    var all = JSON.parse(raw);
    var key = name.toLowerCase();
    return all[key] || { answered: {}, picks: {}, scored: {}, score: 0 };
  } catch(e) { return { answered: {}, picks: {}, scored: {}, score: 0 }; }
}

function saveProgress(answered, picks, score, scored) {
  var name = getPlayerName();
  if (!name) return;
  try {
    var raw = localStorage.getItem(QUIZ_PROGRESS_KEY);
    var all = raw ? JSON.parse(raw) : {};
    var key = name.toLowerCase();
    all[key] = { answered: answered, picks: picks, scored: scored, score: score, updated: Date.now() };
    localStorage.setItem(QUIZ_PROGRESS_KEY, JSON.stringify(all));
  } catch(e) {}
}

function loadBestScore() {
  var name = getPlayerName();
  if (!name) return 0;
  try {
    var raw = localStorage.getItem(QUIZ_SCORE_KEY);
    if (!raw) return 0;
    var all = JSON.parse(raw);
    return all[name.toLowerCase()] || 0;
  } catch(e) { return 0; }
}

function saveBestScore(score) {
  var name = getPlayerName();
  if (!name) return;
  try {
    var raw = localStorage.getItem(QUIZ_SCORE_KEY);
    var all = raw ? JSON.parse(raw) : {};
    var key = name.toLowerCase();
    if (score > (all[key] || 0)) {
      all[key] = score;
      localStorage.setItem(QUIZ_SCORE_KEY, JSON.stringify(all));
    }
  } catch(e) {}
}

// ── State ──────────────────────────────────
var LETTERS = ['A','B','C','D','E'];
var cur = 0;
var answered = {};   // {qnum: true}
var picks = {};      // {qnum: "chosen_word"}
var scored = {};     // {qnum: true} — already counted in score
var score = 0;
var bestScore = 0;
var playerName = null;

// Load persisted state
(function init() {
  QUIZ.forEach(function(q){ for(var i=q.o.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=q.o[i];q.o[i]=q.o[j];q.o[j]=t;} });
  playerName = getPlayerName();
  bestScore = loadBestScore();
  var prog = loadProgress();
  if (prog.answered) answered = prog.answered;
  if (prog.picks) picks = prog.picks;
  if (prog.scored) scored = prog.scored;
  if (typeof prog.score === 'number') score = prog.score;
  // Skip correctly answered questions by default
  cur = 0;
  while (cur < 100 && answered[cur+1] && picks[cur+1] === QUIZ[cur].a) cur++;
  // Show user badge
  if (playerName) {
    var badge = document.getElementById('userBadge');
    badge.style.display = 'inline-block';
    badge.textContent = '👤 ' + playerName + ' — 진행상황 저장됨';
  }
  if (bestScore > 0) {
    var bb = document.getElementById('bestBadge');
    bb.style.display = 'inline-block';
    bb.textContent = '최고: ' + bestScore + '점';
  }
  render();
})();

// ── Render ─────────────────────────────────
function render() {
  if (cur >= 100) { showResult(); return; }
  var q = QUIZ[cur];
  document.getElementById('progressFill').style.width = (cur/100*100) + '%';
  document.getElementById('progressText').textContent = (cur+1) + '/100';
  document.getElementById('scoreBadge').textContent = Object.keys(scored).length + '/100';

  var wasCorrect = answered[cur+1] && picks[cur+1] === q.a;
  var wasWrong = answered[cur+1] && picks[cur+1] !== q.a;
  var h = '<div class="q-card">';
  h += '<span class="q-num">문제 ' + q.n + '</span>';
  if (wasCorrect) h += '<span class="q-solved">✅ 맞춤</span>';
  else if (wasWrong) h += '<span class="q-solved" style="color:var(--wrong)">❌ 오답 (재도전)</span>';
  h += '<div class="q-text">' + q.q.replace(/______/g, '<span class="q-blank">______</span>') + '</div>';
  if (wasCorrect) {
    // Read-only: previously correct
    h += '<div class="options">';
    q.o.forEach(function(opt, i) {
      var cls = 'opt-btn disabled';
      if (opt === q.a) cls += ' show-correct';
      h += '<button class="' + cls + '"><span class="letter">' + LETTERS[i] + '</span>' + opt + '</button>';
    });
    h += '</div>';
    h += '<div class="feedback show correct-fb">✅ 정답입니다!</div>';
    if (EXPLANATIONS[q.n]) {
      h += '<span class="exp-toggle" onclick="toggleExp(' + q.n + ')">📖 해설 보기</span>';
      h += '<div class="explanation" id="exp-' + q.n + '">' + EXPLANATIONS[q.n] + '</div>';
    }
    h += '<div class="action-row"><button class="btn-next show" onclick="next()">다음 문제 ▶</button></div>';
  } else {
    // Active question (unanswered or previously wrong)
    if (wasWrong) {
      h += '<div class="feedback show wrong-fb" style="margin-bottom:12px">이전에 "<strong>' + picks[cur+1] + '</strong>"를 골랐습니다. 다시 풀어보세요.</div>';
    }
    h += '<div class="options">';
    q.o.forEach(function(opt, i) {
      h += '<button class="opt-btn" onclick="pick(this,\'' + opt.replace(/'/g,"\\'") + '\')" data-opt="' + opt.replace(/"/g,'&quot;') + '">';
      h += '<span class="letter">' + LETTERS[i] + '</span>' + opt + '</button>';
    });
    h += '</div>';
    h += '<div class="feedback" id="fb"></div>';
    h += '<div class="explanation" id="exp-' + q.n + '"></div>';
    h += '<span class="exp-toggle" id="expTgl-' + q.n + '" style="display:none" onclick="toggleExp(' + q.n + ')">📖 해설 보기</span>';
    h += '<div class="action-row"><button class="btn-next" id="btnNext" onclick="next()">다음 문제 ▶</button></div>';
  }
  h += '</div>';
  document.getElementById('questionArea').innerHTML = h;
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionArea').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleExp(n) {
  var el = document.getElementById('exp-' + n);
  if (!el) return;
  el.classList.toggle('show');
}

// ── Answer ──────────────────────────────────
function pick(btn, chosen) {
  var q = QUIZ[cur];
  // Only block if already answered correctly; wrong answers can retry
  if (answered[cur+1] && picks[cur+1] === q.a) return;
  var ok = (chosen === q.a);
  var wasWrongBefore = answered[cur+1] && picks[cur+1] !== q.a;
  answered[cur+1] = true;
  picks[cur+1] = chosen;
  // Increment score only on first correct answer
  if (ok && !scored[cur+1]) { score++; scored[cur+1] = true; }
  saveProgress(answered, picks, score, scored);
  saveBestScore(score);

  var btns = document.querySelectorAll('.opt-btn');
  btns.forEach(function(b) {
    b.classList.add('disabled');
    if (b.dataset.opt === q.a) b.classList.add('show-correct');
    if (b === btn && !ok) b.classList.add('wrong');
  });
  var fb = document.getElementById('fb');
  fb.classList.add('show');
  fb.classList.add(ok ? 'correct-fb' : 'wrong-fb');
  fb.textContent = ok ? '✅ 정답입니다!' : '❌ 오답입니다. 정답: ' + q.a;
  document.getElementById('btnNext').classList.add('show');
  document.getElementById('scoreBadge').textContent = Object.keys(scored).length + '/100';

  // Show explanation toggle
  if (EXPLANATIONS[q.n]) {
    var expDiv = document.getElementById('exp-' + q.n);
    if (expDiv) { expDiv.innerHTML = EXPLANATIONS[q.n]; expDiv.classList.add('show'); }
    var tgl = document.getElementById('expTgl-' + q.n);
    if (tgl) { tgl.style.display = 'inline-block'; tgl.textContent = '📖 해설 접기'; }
  }

  if (bestScore > 0) {
    var bb = document.getElementById('bestBadge');
    bb.style.display = 'inline-block';
    bb.textContent = '최고: ' + Math.max(score, bestScore) + '점';
  }
}

function next() {
  // Skip only correctly answered questions; wrong ones stay in rotation
  do { cur++; } while (cur < 100 && answered[cur+1] && picks[cur+1] === QUIZ[cur].a);
  if (cur >= 100) { showResult(); return; }
  render();
}

// ── Result ──────────────────────────────────
function showResult() {
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = '100/100';
  document.getElementById('scoreBadge').textContent = Object.keys(scored).length + '/100';

  var totalCorrect = Object.keys(scored).length;
  var totalAttempted = Object.keys(answered).length;
  var pct = totalCorrect;

  var p = document.getElementById('resultPanel'); p.classList.add('show');
  document.getElementById('resultScore').textContent = totalCorrect + ' / 100';
  var bestMsg = '';
  if (bestScore > 0) bestMsg = ' (개인 최고: ' + bestScore + '점)';
  document.getElementById('resultBest').textContent = bestMsg;

  var msg = '';
  if (pct >= 90) msg = '🏆 탁월합니다! GRE 수준 어휘력이 매우 뛰어납니다.';
  else if (pct >= 70) msg = '👍 좋은 성적입니다. 꾸준히 복습하면 90점 이상도 가능합니다.';
  else if (pct >= 50) msg = '📚 절반 이상 맞추셨네요. 해설을 정독하며 오답을 복습해보세요.';
  else msg = '💪 아직 갈 길이 멉니다. 단어장3을 다시 한번 정독하고 재도전해보세요.';
  document.getElementById('resultDetail').textContent = msg;

  var rev = '<tr><th>#</th><th>선택</th><th>정답</th><th>결과</th></tr>';
  var unanswered = [];
  for (var i = 0; i < 100; i++) {
    var qq = QUIZ[i];
    if (!answered[qq.n]) { unanswered.push(qq.n); continue; }
    var ok = picks[qq.n] === qq.a;
    rev += '<tr><td>' + qq.n + '</td><td class="' + (ok ? 'review-correct' : 'review-wrong') + '">' + (picks[qq.n]||'—') + '</td><td>' + qq.a + '</td><td class="' + (ok ? 'review-correct' : 'review-wrong') + '">' + (ok ? '✓' : '✗') + '</td></tr>';
  }
  if (unanswered.length > 0) {
    rev += '<tr><td colspan="4" style="color:var(--muted);padding-top:12px">⚠️ 미응시: ' + unanswered.join(', ') + '</td></tr>';
  }
  document.getElementById('reviewTable').innerHTML = rev;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Actions ─────────────────────────────────
function restartQuiz() {
  // Skip correctly answered; re-show wrong/unanswered
  cur = 0;
  while (cur < 100 && answered[cur+1] && picks[cur+1] === QUIZ[cur].a) cur++;
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionArea').style.display = 'block';
  render();
}

function resetProgress() {
  if (!confirm('정말로 모든 진행상황과 점수를 초기화하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
  answered = {}; picks = {}; scored = {}; score = 0; cur = 0;
  saveProgress(answered, picks, score, scored);
  QUIZ.forEach(function(q){ for(var i=q.o.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=q.o[i];q.o[i]=q.o[j];q.o[j]=t;} });
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('questionArea').style.display = 'block';
  render();
}
</script>
