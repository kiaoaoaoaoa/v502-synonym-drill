<script>

  {n:72,q:"A single flickering candle on each table, the smell of old vellum, and the distant sound of a cello practicing: the bookshop's ______ was so carefully cultivated that customers unconsciously lowered their voices upon entering, as if stepping into a sanctuary.",a:"ambiance"},
  {n:73,q:"Only a(n) ______ surgeon could have attempted that operation — the left hand retracting the dura mater with submillimeter precision while the right excised a tumor enmeshed in the motor cortex.",a:"ambidextrous"},

  {n:75,q:"The lab's clean room maintains a constant ______ pressure slightly higher than the outside atmosphere, so that when the door opens, air flows outward — carrying potential contaminants away from the silicon wafers rather than toward them.",a:"ambient"},

  {n:79,q:"Though she arrived at the ER unable to bear weight on either leg, by her third postoperative day the patient was ______ once more — the attending surgeon attributed this to a combination of excellent bone density, stubbornness, and what he called \"an unseemly eagerness to prove the textbooks wrong.\"",a:"ambulatory"},

let revealed = new Set();
let allRevealed = false;

function renderAll() {
  const container = document.getElementById('questions');
  let html = '';
  QUESTIONS.forEach(q => {
    html += '<div class="q-card" id="q-' + q.n + '">';
    html += '<span class="q-num">#' + q.n + '</span>';
    html += '<div class="q-text">' + q.q.replace(/______/g, '<span class="q-blank">______</span>') + '</div>';
    html += '<div class="q-answer"><strong>정답:</strong> ' + q.a + '</div>';
    html += '<span class="toggle-answer" onclick="toggleQ(' + q.n + ')">정답 보기 / 가리기</span>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function toggleQ(n) {
  const card = document.getElementById('q-' + n);
  card.classList.toggle('revealed');
  if (card.classList.contains('revealed')) revealed.add(n);
  else revealed.delete(n);
  updateCount();
}

function revealAll() {
  allRevealed = true;
  QUESTIONS.forEach(q => {
    document.getElementById('q-' + q.n).classList.add('revealed');
    revealed.add(q.n);
  });
  updateCount();
}

function hideAll() {
  allRevealed = false;
  QUESTIONS.forEach(q => {
    document.getElementById('q-' + q.n).classList.remove('revealed');
    revealed.delete(q.n);
  });
  updateCount();
}

function updateCount() {
  document.getElementById('progressCount').textContent = revealed.size + '/100 공개';
}

function scrollToQ(n) {
  const el = document.getElementById('q-' + n);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

window.addEventListener('scroll', () => {
  document.getElementById('toTop').style.display = window.scrollY > 400 ? 'block' : 'none';
});

renderAll();
</script>
</body>
</html>
